# Template REWL config. Copy and edit per (system size, window layout).
# All keys are required unless marked OPTIONAL.

random_seed: 0                       # default; CLI --seed overrides

system:
  n_sc: 6
  ce: paircut9_5_5_ardr_n96          # named preset, OR set ce_path instead
  # ce_path: ../local_fit.ce         # filesystem path (mutually exclusive with ce)

windows:
  energy_spacing: 0.1
  list:
    # [lo (eV), hi (eV), walkers]; adjacent windows MUST overlap.
    - [-100.0, -98.0, 2]
    - [-98.5, -96.0, 2]
    - [-96.5, -94.0, 1]

wl:
  flatness_limit: 0.8
  fill_factor_limit: 1.0e-12
  schedule: "1_over_t"
  flatness_mode: "pooled"            # "pooled" or "per_walker"
  merge_cadence: "at_halve"          # "at_halve" or "never"
  n_trials_per_walker: 20000000
  block_size_sweeps: 10
  trajectory_write_interval_sweeps: 100   # 0 disables trajectories
  one_over_t_gate: "visit_once"      # OPTIONAL: "visit_once" (default) or "flatness"
  bp_stall_multiple: 4.0             # OPTIONAL: only used when one_over_t_gate is "flatness"
  one_over_t_entry: "window_clock"   # OPTIONAL: "window_clock" (default) or "f_continuous"

moves:
  - {type: pair_swap, weight: 0.1}
  - {type: row_shift, weight: 0.2}
  - {type: motif_shift, weight: 0.5}
  - {type: chain_swap, weight: 0.5}
  - {type: row_reflect, weight: 0.5}
  - {type: cell_reflect, weight: 0.01}

config_search:
  n_workers: null                  # null -> library default (os.cpu_count())
  window_search_penalty: 2.0       # into-window penalty-walk bias (higher = stronger)
  walk_sweeps: 50                  # MC sweeps per confined walk (x total atoms = MC steps)
  max_walks_per_window: 20         # walks per window; must be >= largest walker count

checkpoint:
  filename: rewl_state.h5
  interval_cycles: 1000              # 0 disables periodic writes; final always emits

# OPTIONAL: structural-measurement pass (`rewl measure`). Omit this whole
# section for a DOS-only run. Reweighting to <O>(T)/Binder is a separate
# manual step (see README).
measurement:
  checkpoint_filename: rewl_measure.h5    # MUST differ from checkpoint.filename
  observer_interval: 648                  # MC trial steps between observations; one anion sweep is 3 * n_sc**3 (= 648 for this n_sc=6 template -- rescale if you change n_sc)
  n_measure_cycles: 2000                  # measurement cycle budget
  checkpoint_interval_cycles: 100         # 0 disables periodic writes; final always emits
  ops: [chi_11, closest_chi, closest_sim, icoh_global, icoh_nn, oof_amp, cis_frac, nbo4f2_frac, collinear_ff]
