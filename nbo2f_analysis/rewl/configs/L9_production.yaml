# REWL production L=9 (mirrors analysis/fss_analysis/rewl_production_L9.py)
random_seed: 42

system:
  n_sc: 9
  ce: paircut9_5_5_ardr_n96

windows:
  energy_spacing: 0.1
  list:
    - [-25474.0, -25472.5, 2]
    - [-25473.5, -25471.5, 2]
    - [-25472.5, -25471.0, 2]
    - [-25472.0, -25470.0, 2]
    - [-25471.2, -25467.2, 2]
    - [-25468.4, -25464.4, 2]
    - [-25465.6, -25459.6, 1]
    - [-25461.6, -25453.6, 1]
    - [-25455.6, -25445.6, 1]
    - [-25447.6, -25433.0, 1]

wl:
  flatness_limit: 0.8
  fill_factor_limit: 1.0e-12
  schedule: "1_over_t"
  flatness_mode: "pooled"
  merge_cadence: "at_halve"
  n_trials_per_walker: 20000000
  block_size_sweeps: 10
  trajectory_write_interval_sweeps: 100

moves:
  - {type: pair_swap, weight: 0.1}
  - {type: row_shift, weight: 0.2}
  - {type: motif_shift, weight: 0.5}
  - {type: chain_swap, weight: 0.5}
  - {type: row_reflect, weight: 0.5}
  - {type: cell_reflect, weight: 0.01}

config_search:
  n_workers: null
  temperature_high: 3000.0
  temperature_low: 100.0
  n_temperature_levels: 12
  sweeps_per_level: 20
  harvest_interval_sweeps: 5
  max_anneals_per_worker: 200
  backstop_temperature: 300.0
  backstop_sweeps: 500

checkpoint:
  filename: rewl_state.h5
  interval_cycles: 1000
